name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r 01_rag_baseline/requirements.txt
          python -m pip install pytest ipykernel nbconvert

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Validate dataset
        run: |
          python 01_rag_baseline/validate_dataset.py \
            01_rag_baseline/benchmark/cases.jsonl

      - name: Execute notebook offline
        run: |
          python -m jupyter nbconvert \
            --to notebook \
            --execute 01_rag_baseline/faq_rag_chatbot.ipynb \
            --output faq_rag_chatbot.local-ci.ipynb \
            --output-dir /tmp \
            --ExecutePreprocessor.kernel_name=python3 \
            --ExecutePreprocessor.timeout=300

      - name: Validate executed notebook
        run: |
          python - <<'PY'
          import nbformat

          path = "/tmp/faq_rag_chatbot.local-ci.ipynb"
          notebook = nbformat.read(path, as_version=4)
          nbformat.validate(notebook)

          errors = [
              output
              for cell in notebook.cells
              for output in cell.get("outputs", [])
              if output.get("output_type") == "error"
          ]

          assert not errors, f"Notebook contains {len(errors)} error outputs"
          print("Notebook validation passed")
          PY

      - name: Verify no tracked artifacts
        run: |
          ! git ls-files | grep -E '(\.env|\.venv|__pycache__|\.pyc$|\.log$|checkpoint|\.cache|executed\.ipynb)'
