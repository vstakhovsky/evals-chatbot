name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --break-system-packages --user ipykernel nbconvert
        pip install -r 01_rag_baseline/requirements.txt

    - name: Run tests
      run: |
        python tests/test_metrics.py
        python tests/test_dataset.py
        python tests/test_notebook.py
        python tests/test_embedding_cache.py

    - name: Validate dataset
      working-directory: 01_rag_baseline
      run: |
        python validate_dataset.py benchmark/cases.jsonl

    - name: Execute notebook offline
      working-directory: 01_rag_baseline
      run: |
        python -m jupyter nbconvert --to notebook --execute \
          --output /tmp/faq_rag_chatbot.ci.ipynb \
          faq_rag_chatbot.ipynb

    - name: Verify no tracked artifacts
      run: |
        ! git ls-files | grep -E '(\.env|\.venv|__pycache__|\.pyc$|\.log$|checkpoint|\.cache)'
