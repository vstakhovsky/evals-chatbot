name: Gitleaks Secret Scanning

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2.1.0
